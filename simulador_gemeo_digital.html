
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador Gêmeo Digital - Iris</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2dd4bf; margin: 0 0 10px 0; }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            z-index: 10;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        button:hover { background: #2dd4bf; }
        button.alert-btn { background: #fb7185; }
        button.alert-btn:hover { background: #e11d48; }
        
        #canvas-container {
            width: 900px;
            height: 500px;
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .status-bar {
            margin-top: 30px;
            padding: 15px 30px;
            background: #1e293b;
            border: 2px solid #2dd4bf;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.5s;
        }
        .status-bar.alert {
            border-color: #fb7185;
            color: #fb7185;
            box-shadow: 0 0 20px rgba(251, 113, 133, 0.2);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <div class="header">
        <h1>Motor do Gêmeo Digital (Visualização em Tempo Real)</h1>
        <p>Acompanhe o estado comportamental simulado integrado ao ServiceNow</p>
    </div>

    <div class="controls">
        <button onclick="setMode('individual')">1. Visão Individual (Micro-Gêmeo)</button>
        <button onclick="setMode('cluster')">2. Visão de Clusters (Macro-Gêmeo)</button>
        <button class="alert-btn" onclick="triggerAlert()">3. Simular Fricção / Gargalo</button>
    </div>

    <div id="canvas-container">
        </div>

    <div id="status-bar" class="status-bar">
        Status Atual: Gêmeo Digital operando de forma saudável.
    </div>

    <script>
        const width = 900;
        const height = 500;
        const svg = d3.select("#canvas-container").append("svg")
            .attr("width", width)
            .attr("height", height);

        let mode = 'individual';
        let isAlert = false;

        // Função para criar o polígono dinâmico (Casco Convexo)
        function generatePolygonPoints(cx, cy, radius, jitter) {
            const points = [];
            const numPoints = 8;
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                const r = radius + (Math.random() - 0.5) * jitter;
                points.push([
                    cx + Math.cos(angle) * r,
                    cy + Math.sin(angle) * r
                ]);
            }
            return points;
        }

        // Função principal de desenho e animação
        function draw() {
            svg.selectAll("*").remove();

            if (mode === 'individual') {
                const cx = width / 2;
                const cy = height / 2;
                // Se houver alerta, o polígono encolhe (tensão) e muda de cor
                const radius = isAlert ? 70 : 160;
                const color = isAlert ? "#fb7185" : "#2dd4bf";
                const jitter = isAlert ? 40 : 25;

                const points = generatePolygonPoints(cx, cy, radius, jitter);
                
                // Desenha a "Área de Segurança" do usuário
                svg.append("path")
                    .attr("d", d3.line().curve(d3.curveCardinalClosed)(points))
                    .attr("fill", color)
                    .attr("fill-opacity", 0.2)
                    .attr("stroke", color)
                    .attr("stroke-width", 3);

                // Ponto central representando o usuário
                svg.append("circle")
                    .attr("cx", cx)
                    .attr("cy", cy)
                    .attr("r", 6)
                    .attr("fill", "#fff");
                
                svg.append("text")
                    .attr("x", cx)
                    .attr("y", cy - radius - 20)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#94a3b8")
                    .text(isAlert ? "Gêmeo Digital: Estado Crítico" : "Gêmeo Digital: Saudável");

            } else {
                // Visão de Clusters (K-Means)
                const clusters = [
                    {x: width * 0.25, y: height * 0.5, color: "#2dd4bf", count: 8, label: "Cluster 0 (Fluido)"},
                    {x: width * 0.75, y: height * 0.45, color: "#fb7185", count: 6, label: "Cluster 1 (Crítico)"},
                    {x: width * 0.5, y: height * 0.7, color: "#f59e0b", count: 5, label: "Cluster 2 (Infra)"}
                ];

                clusters.forEach(c => {
                    for (let i = 0; i < c.count; i++) {
                        const offset_x = (Math.random() - 0.5) * 120;
                        const offset_y = (Math.random() - 0.5) * 120;
                        const points = generatePolygonPoints(c.x + offset_x, c.y + offset_y, 25, 8);
                        
                        svg.append("path")
                            .attr("d", d3.line().curve(d3.curveCardinalClosed)(points))
                            .attr("fill", c.color)
                            .attr("fill-opacity", 0.3)
                            .attr("stroke", c.color)
                            .attr("stroke-width", 1);
                    }
                    
                    svg.append("text")
                        .attr("x", c.x)
                        .attr("y", c.y - 90)
                        .attr("text-anchor", "middle")
                        .attr("fill", c.color)
                        .attr("font-weight", "bold")
                        .text(c.label);
                });
            }
        }

        // Controles de estado acionados pelos botões
        function setMode(newMode) {
            mode = newMode;
            isAlert = false;
            document.getElementById('status-bar').classList.remove('alert');
            document.getElementById('status-bar').innerText = "Status Atual: Gêmeo Digital operando de forma saudável. (Apenas Monitoramento)";
            draw();
        }

        function triggerAlert() {
            if(mode !== 'individual') setMode('individual');
            isAlert = true;
            document.getElementById('status-bar').classList.add('alert');
            document.getElementById('status-bar').innerText = "ALERTA PROATIVO! Fricção detectada. Chamando Table API para criar Incidente P1...";
            draw();
        }

        // Inicia o primeiro desenho
        draw();
        
        // Loop de animação contínua (Pulso)
        setInterval(() => {
            draw();
        }, 800); // Atualiza a cada 800ms para dar o efeito de movimento
    </script>
</body>
</html>
